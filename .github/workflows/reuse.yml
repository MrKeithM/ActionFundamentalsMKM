name: Reusable workflow

on:
  workflow_call:
    inputs:
      who-to-greet:
        required: true
        type: string
    outputs:
      current-time:
        description: "Time generated by the workflow"
        value: ${{ jobs.generate.outputs.time }}

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      time: ${{ steps.now.outputs.time }}
    steps:
      - id: now
        run: echo "time=$(date -u)" >> $GITHUB_OUTPUT
